{{ define "main" }}
<article class="article">
  <header class="article-header">
    <h1>{{ .Title }}</h1>
    <div class="article-meta">
      <time>{{ .Date.Format "2006-01-02" }}</time>
      {{ with .Params.tags }}
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
      {{ end }}
      <span>{{ .WordCount }} words</span>
    </div>
  </header>

  <div class="article-body">
    {{ .Content }}
  </div>

  <nav class="article-nav">
    {{ with .PrevInSection }}<a class="nav-prev" href="{{ .RelPermalink }}">← {{ .Title }}</a>{{ end }}
    {{ with .NextInSection }}<a class="nav-next" href="{{ .RelPermalink }}">{{ .Title }} →</a>{{ end }}
  </nav>
</article>
{{ end }}
